<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>New password — EX</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iIzBhMGEwYSIvPgogIDx0ZXh0IHg9IjUiIHk9IjIzIiBmb250LWZhbWlseT0iQXJpYWwgQmxhY2ssIHNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSI5MDAiIGZvbnQtc2l6ZT0iMTgiIGZpbGw9IiMwMEU2NzYiPkVYPC90ZXh0Pgo8L3N2Zz4="/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--g:#00E676;--gd:#00a855;--b:#0a0a0a;--w:#fafafa;--m:#6b7280;--border:rgba(0,0,0,0.08);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;}
body{font-family:'Manrope',sans-serif;color:var(--b);
  background:radial-gradient(ellipse at 50% 30%,#fffff8,#f7f6ee 40%,#ece9dc 80%,#ddd9c8);
  min-height:100vh;display:flex;flex-direction:column;}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,0,0,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.025) 1px,transparent 1px);
  background-size:52px 52px;}
.nav{position:sticky;top:0;z-index:50;height:52px;display:flex;align-items:center;
  justify-content:space-between;padding:0 28px;
  background:rgba(248,246,236,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-size:17px;font-weight:900;letter-spacing:-1px;color:var(--b);text-decoration:none;}
.nav-logo .dot{color:var(--g);}
.page{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{width:100%;max-width:400px;background:rgba(255,255,255,.93);backdrop-filter:blur(32px);
  border:1px solid rgba(255,255,255,.92);border-radius:3px;
  box-shadow:0 2px 4px rgba(0,0,0,.04),0 8px 16px rgba(0,0,0,.06),0 24px 48px rgba(0,0,0,.09);
  overflow:hidden;animation:up .6s cubic-bezier(.16,1,.3,1);}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.card-bar{height:3px;background:linear-gradient(90deg,var(--g),var(--gd));}
.card-head{padding:28px 28px 20px;text-align:center;border-bottom:1px dashed rgba(0,0,0,.08);}
.head-brand{display:inline-flex;align-items:center;gap:7px;margin-bottom:14px;text-decoration:none;}
.head-dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pd 2s ease infinite;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.35}}
.head-name{font-size:12px;font-weight:800;color:var(--b);}
.head-title{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;}
.head-sub{font-size:13px;color:var(--m);}
.card-body{padding:22px 28px 24px;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(0,0,0,.3);margin-bottom:5px;}
.field input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;
  background:#fafaf8;color:var(--b);font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;
  outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(0,230,118,.1);background:#fff;}
.field input::placeholder{color:rgba(0,0,0,.18);}
.strength{height:3px;border-radius:100px;background:var(--border);margin-top:6px;overflow:hidden;}
.strength-fill{height:100%;border-radius:100px;transition:width .3s,background .3s;width:0%;}
.strength-lbl{font-size:10px;font-weight:600;color:var(--m);margin-top:4px;}
.error{font-size:12px;color:#e11d48;font-weight:600;padding:8px 12px;
  background:rgba(225,29,72,.05);border:1px solid rgba(225,29,72,.15);border-radius:7px;margin-bottom:10px;display:none;}
.submit-btn{width:100%;padding:13px;background:var(--b);color:#fff;border:none;border-radius:8px;
  font-family:'Manrope',sans-serif;font-size:14px;font-weight:800;cursor:pointer;
  position:relative;overflow:hidden;transition:all .3s;margin-top:4px;}
.submit-btn::after{content:'';position:absolute;inset:0;background:var(--g);
  transform:translateY(101%);transition:transform .4s cubic-bezier(.16,1,.3,1);}
.submit-btn:hover::after{transform:translateY(0);}
.submit-btn:hover{box-shadow:0 6px 20px rgba(0,230,118,.3);}
.submit-btn span{position:relative;z-index:1;transition:color .35s;}
.submit-btn:hover span{color:var(--b);}
.submit-btn:disabled{opacity:.55;cursor:not-allowed;}
.submit-btn:disabled::after{display:none;}
.invalid-state{text-align:center;padding:20px 0;}
.invalid-state p{font-size:13px;color:var(--m);line-height:1.6;margin-bottom:16px;}
.invalid-state a{color:var(--gd);font-weight:700;text-decoration:none;}
.card-foot{padding:12px 28px 16px;border-top:1px dashed rgba(0,0,0,.07);text-align:center;}
.card-foot p{font-size:9.5px;color:rgba(0,0,0,.22);font-family:monospace;letter-spacing:.04em;line-height:1.9;}
.card-foot .g{color:var(--gd);}
</style>
</head>
<body>
<div class="grid-bg"></div>
<nav class="nav">
  <a href="splash.html" class="nav-logo">EX<span class="dot">.</span></a>
</nav>
<div class="page">
  <div class="card">
    <div class="card-bar"></div>
    <div class="card-head">
      <a href="splash.html" class="head-brand">
        <div class="head-dot"></div>
        <span class="head-name">Exam Armour</span>
      </a>
      <div class="head-title" id="card-title">New password</div>
      <div class="head-sub" id="card-sub">Choose a strong password for your account</div>
    </div>
    <div class="card-body" id="card-body">
      <div id="loading-state" style="text-align:center;padding:20px 0;color:var(--m);font-size:13px;">
        Verifying reset link...
      </div>
    </div>
    <div class="card-foot">
      <p><span class="g">EXAMARMOUR.COM</span><br/>contact@examarmour.com</p>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://ucfavwmylklrnchfsttx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjZmF2d215bGtscm5jaGZzdHR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTk5NTIsImV4cCI6MjA4OTc3NTk1Mn0.3Ig9UUfe29LQpUiHImgIaf4qUCcLQSLUBuYvBsPUedI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Supabase puts the token in the URL hash — listen for the session
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    showForm();
  } else if (event === 'SIGNED_IN' && session) {
    // Already handled by PASSWORD_RECOVERY
  }
});

// Also check on load in case hash is already there
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    showForm();
  } else {
    // Give Supabase a moment to process the hash
    setTimeout(() => {
      const body = document.getElementById('card-body');
      if (document.getElementById('loading-state')) {
        showInvalid();
      }
    }, 2000);
  }
})();

function showForm() {
  document.getElementById('card-body').innerHTML = `
    <div class="field">
      <label>New password</label>
      <input type="password" id="pw1" placeholder="At least 8 characters" autocomplete="new-password" oninput="checkStrength()"/>
      <div class="strength"><div class="strength-fill" id="sf"></div></div>
      <div class="strength-lbl" id="sl"></div>
    </div>
    <div class="field">
      <label>Confirm new password</label>
      <input type="password" id="pw2" placeholder="Same password again" autocomplete="new-password"/>
    </div>
    <div class="error" id="error"></div>
    <button class="submit-btn" id="submit" onclick="handleUpdate()">
      <span id="btn-label">Update password</span>
    </button>`;
}

function showInvalid() {
  document.getElementById('card-title').textContent = 'Link expired';
  document.getElementById('card-sub').textContent = 'This reset link is no longer valid';
  document.getElementById('card-body').innerHTML = `
    <div class="invalid-state">
      <p>Reset links expire after 1 hour. Please request a new one.</p>
      <a href="forgot-password.html">Request new reset link →</a>
    </div>`;
}

function checkStrength() {
  const pw = document.getElementById('pw1').value;
  const sf = document.getElementById('sf');
  const sl = document.getElementById('sl');
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { w: '20%', c: '#e11d48', l: 'Too weak' },
    { w: '40%', c: '#f97316', l: 'Weak' },
    { w: '60%', c: '#eab308', l: 'Fair' },
    { w: '80%', c: '#84cc16', l: 'Good' },
    { w: '100%', c: '#00a855', l: 'Strong' },
  ];
  const lvl = levels[Math.max(0, score - 1)] || levels[0];
  sf.style.width = pw ? lvl.w : '0%';
  sf.style.background = lvl.c;
  sl.textContent = pw ? lvl.l : '';
}

async function handleUpdate() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw1.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (pw1 !== pw2) { showError('Passwords do not match.'); return; }

  const btn = document.getElementById('submit');
  btn.disabled = true;
  document.getElementById('btn-label').textContent = 'Updating...';

  const { error } = await sb.auth.updateUser({ password: pw1 });
  if (error) {
    showError(error.message);
    btn.disabled = false;
    document.getElementById('btn-label').textContent = 'Update password';
    return;
  }

  // Success — redirect to dashboard
  document.getElementById('card-body').innerHTML = `
    <div style="text-align:center;padding:16px 0">
      <div style="font-size:32px;margin-bottom:12px">✓</div>
      <div style="font-size:15px;font-weight:800;margin-bottom:6px">Password updated!</div>
      <div style="font-size:13px;color:var(--m)">Redirecting you to your dashboard...</div>
    </div>`;
  setTimeout(() => window.location.href = 'dashboard.html', 2000);
}

function showError(msg) {
  const el = document.getElementById('error');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}
</script>
</body>
</html>
